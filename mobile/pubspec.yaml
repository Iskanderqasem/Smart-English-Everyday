name: smart_english_everyday
description: AI-powered English learning platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Network
  dio: ^5.3.3

  # Dependency Injection
  get_it: ^7.6.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Authentication
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0
  flutter_facebook_auth: ^6.0.4

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.9

  # Text to Speech & Speech
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  record: ^5.0.4

  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.3.0

  # Images
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7

  # Charts & Data Viz
  fl_chart: ^0.65.0

  # Calendar
  table_calendar: ^3.0.9

  # QR & Sharing
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1

  # Utilities
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  local_auth: ^2.1.8
  package_info_plus: ^5.0.1
  intl: ^0.18.1
  wakelock_plus: ^1.1.4

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Functional Programming
  dartz: ^0.10.1

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Video
  video_player: ^2.8.1

  # Google Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
