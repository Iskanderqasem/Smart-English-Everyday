name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > mobile/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> mobile/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> mobile/android/key.properties
          echo "storeFile=keystore.jks" >> mobile/android/key.properties

      - name: Get packages
        working-directory: mobile
        run: flutter pub get

      - name: Build Release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Build Release AAB
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Generate QR Code
        run: |
          npm install -g qrcode-cli
          mkdir -p docs/qr-codes
          TAG=${GITHUB_REF#refs/tags/}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-release.apk"
          qrcode "$APK_URL" > docs/qr-codes/latest.png
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
            docs/qr-codes/latest.png
          body: |
            ## Smart English Everyday ${{ github.ref_name }}

            ### 📱 Installation
            **Android APK** — Download and install directly:
            1. Download `app-release.apk` below
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK

            **QR Code** — Scan to download:
            ![QR Code](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.png)

            ### 🔗 Direct APK Link
            ${{ env.APK_URL }}

            ### What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
