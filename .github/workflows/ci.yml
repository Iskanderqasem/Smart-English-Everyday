name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FLUTTER_VERSION: '3.24.0'
  NODE_VERSION: '20'

jobs:

  # -----------------------------------------
  build-flutter-web:
    name: Build Flutter Web + Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter packages
        working-directory: mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: mobile
        run: |
          set +e
          OUTPUT=$(flutter build web \
            --release \
            --base-href "/Smart-English-Everyday/" \
            --web-renderer canvaskit 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "$OUTPUT" | grep -E "error:|Error:|\.dart:|exception" | head -40 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
          exit $EXIT_CODE

      - name: Add .nojekyll
        run: touch mobile/build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/build/web
          force_orphan: true
          commit_message: "deploy: Flutter web build ${{ github.sha }}"

  # -----------------------------------------
  build-android-debug-apk:
    name: Build Debug APK + Generate QR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter packages
        working-directory: mobile
        run: flutter pub get

      - name: Build Debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: latest-debug
          name: "Latest Debug Build"
          body: |
            ## Smart English Everyday - Debug APK

            **Auto-built from the latest commit on master.**

            ### Install on Android:
            1. Download `app-debug.apk` below
            2. On your Android phone: Settings -> Security -> Enable "Install unknown apps"
            3. Open the downloaded APK and install

            ### Web App (runs in browser):
            https://iskanderqasem.github.io/Smart-English-Everyday/

            ---
            Built from commit: `${{ github.sha }}`
          files: mobile/build/app/outputs/flutter-apk/app-debug.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate QR Code for APK
        run: |
          npm install -g qrcode-cli 2>/dev/null || npm install qrcode
          mkdir -p docs/qr-codes
          APK_URL="https://github.com/Iskanderqasem/Smart-English-Everyday/releases/download/latest-debug/app-debug.apk"
          WEB_URL="https://iskanderqasem.github.io/Smart-English-Everyday/"
          node -e "
            const QRCode = require('qrcode');
            async function gen() {
              await QRCode.toFile('docs/qr-codes/install-apk.png', '$APK_URL', {
                errorCorrectionLevel: 'H', width: 400, margin: 2,
                color: { dark: '#1a237e', light: '#ffffff' }
              });
              await QRCode.toFile('docs/qr-codes/web-app.png', '$WEB_URL', {
                errorCorrectionLevel: 'H', width: 400, margin: 2,
                color: { dark: '#2e7d32', light: '#ffffff' }
              });
              console.log('QR codes generated');
            }
            gen().catch(console.error);
          " || echo "QR generation skipped"

      - name: Upload QR Code artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qr-codes
          path: docs/qr-codes/
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

  # -----------------------------------------
  analyze-flutter:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get packages
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos || true

  # -----------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: see_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        working-directory: backend
        run: npm ci
      - name: Run tests
        working-directory: backend
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/see_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret_key_32_chars_long
          JWT_REFRESH_SECRET: ci_refresh_secret_key_32_chars
